<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1050" viewBox="0 0 1400 1050">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef3fb" />
      <stop offset="100%" stop-color="#d9e6fb" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f9ff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f3b87" />
      <stop offset="100%" stop-color="#3a68d7" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5aa4ff" />
      <stop offset="100%" stop-color="#86b7ff" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f3b87" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1400" height="1050" fill="url(#bg)" />
  <circle cx="1130" cy="220" r="190" fill="#e7eefb" />
  <circle cx="260" cy="830" r="240" fill="#e4ecfb" />

  <!-- Main dashboard panel -->
  <rect x="180" y="170" width="1040" height="650" rx="36" fill="url(#panel)" stroke="#d7e2f5" stroke-width="6" filter="url(#shadow)" />

  <!-- Left identity column -->
  <rect x="230" y="240" width="280" height="500" rx="24" fill="#f1f5ff" />
  <circle cx="320" cy="320" r="46" fill="url(#primary)" />
  <rect x="380" y="300" width="110" height="18" rx="9" fill="#d7e2f5" />
  <rect x="380" y="326" width="90" height="14" rx="7" fill="#e2eaf7" />

  <!-- Identity cards -->
  <rect x="255" y="395" width="230" height="80" rx="18" fill="#ffffff" stroke="#e3ecfb" />
  <rect x="255" y="495" width="230" height="80" rx="18" fill="#ffffff" stroke="#e3ecfb" />
  <rect x="255" y="595" width="230" height="80" rx="18" fill="#ffffff" stroke="#e3ecfb" />

  <!-- Right auth flow -->
  <rect x="560" y="240" width="610" height="110" rx="22" fill="#ffffff" stroke="#e3ecfb" />
  <rect x="560" y="380" width="610" height="130" rx="22" fill="#ffffff" stroke="#e3ecfb" />
  <rect x="560" y="540" width="610" height="200" rx="22" fill="#ffffff" stroke="#e3ecfb" />

  <!-- MFA chips -->
  <rect x="600" y="280" width="140" height="30" rx="15" fill="#eef3fd" />
  <rect x="760" y="280" width="160" height="30" rx="15" fill="#eef3fd" />
  <rect x="940" y="280" width="160" height="30" rx="15" fill="#eef3fd" />

  <!-- Passkey device -->
  <rect x="610" y="410" width="140" height="80" rx="16" fill="#f4f7ff" />
  <rect x="780" y="410" width="140" height="80" rx="16" fill="#f4f7ff" />
  <rect x="950" y="410" width="140" height="80" rx="16" fill="#f4f7ff" />

  <!-- Shield + check -->
  <path d="M885 600c-65 0-118 42-118 93v45c0 70 56 127 125 127s125-57 125-127v-45c0-51-53-93-118-93z" fill="url(#primary)" opacity="0.12" />
  <path d="M880 615c-46 0-83 30-83 67v40c0 52 38 94 83 94s83-42 83-94v-40c0-37-37-67-83-67z" fill="url(#primary)" />
  <path d="M855 712l18 18 36-36" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Fingerprint glyph -->
  <circle cx="680" cy="655" r="52" fill="url(#accent)" opacity="0.25" />
  <path d="M650 655c0-22 18-40 40-40s40 18 40 40" stroke="#3a68d7" stroke-width="8" fill="none" stroke-linecap="round" />
  <path d="M662 655c0-14 12-26 28-26s28 12 28 26" stroke="#3a68d7" stroke-width="8" fill="none" stroke-linecap="round" />
  <path d="M670 655c0-8 8-16 20-16s20 8 20 16" stroke="#3a68d7" stroke-width="8" fill="none" stroke-linecap="round" />

  <!-- Connection nodes -->
  <circle cx="560" cy="300" r="10" fill="url(#primary)" />
  <circle cx="560" cy="450" r="10" fill="url(#primary)" />
  <circle cx="560" cy="640" r="10" fill="url(#primary)" />
  <line x1="560" y1="300" x2="520" y2="300" stroke="#c8d8f4" stroke-width="6" stroke-linecap="round" />
  <line x1="560" y1="450" x2="520" y2="450" stroke="#c8d8f4" stroke-width="6" stroke-linecap="round" />
  <line x1="560" y1="640" x2="520" y2="640" stroke="#c8d8f4" stroke-width="6" stroke-linecap="round" />
</svg>
